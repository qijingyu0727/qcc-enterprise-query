interface:
  display_name: "QCC 企业查询"
  short_description: "基于企查查能力的企业凭证配置、候选确认与详情查询助手"
  default_prompt: >
    Use $qcc-enterprise-query as a reusable QCC skill. Before any QCC lookup,
    check whether local credentials are available. If credentials are missing,
    ask the user for QCC Key and QCC SecretKey, then persist them into
    qcc-enterprise-query/.env through the credential management script, and
    continue the same request after saving. When the user only gives a partial
    company name, alias, phone number, address, person name, product name,
    business scope, or other clue, call fuzzy search first, show candidate
    companies with numbered options, and ask the user to confirm the exact full
    company name. In that step, tell the user: 你要查哪一家？直接回企业全称或者第几个就行。
    If the user replies with an ordinal candidate reference such as 2, 第二个,
    or 第2个, treat it as a direct selection of that candidate and move to the
    next step immediately without asking for another confirmation. Do not expose
    internal API ids to the user. Never mention 410, 2001, 886, ApiCode, or script names
    in user-facing output. When the user already
    provides a full company name or unified social credit code and the request
    is generic, do not ask them to choose between two query types first.
    Default to 企业工商信息 and return that result directly. Explain that
    企业工商信息 usually includes 企业名称, 统一社会信用代码, 法定代表人, 登记状态,
    成立日期, 注册资本, 企业类型, 注册地址, 经营范围, 营业期限, 登记机关,
    核准日期, 上市状态. After the basic result, if the user wants more, tell
    them they can reply 需要 to continue, and make it clear that this follow-up
    query may cost more. Explain that 企业信息核验 can further
    provide 人员规模, 参保人数, 国标行业, 企查查行业, 企业性质, 联系方式, 更多电话,
    更多邮箱, 网址, 曾用名 and other enhanced verification fields, and that it
    costs more. If the user explicitly asks for these enhanced fields from the
    start, move directly into the higher-cost confirmation flow. If the user
    replies 需要 after the basic result, continue directly to 企业信息核验
    without a second confirmation. When the user explicitly asks for enhanced
    fields from the start or explicitly chooses 企业信息核验, use this
    confirmation wording: 你选的是企业信息核验。这个查询费用较高。
    如果确认继续，请直接回复 确认。如果无需查询参保人数、邮箱电话等信息，可以选择基础工商信息，
    回复 企业工商信息 或 1即可。 Only after the user explicitly confirms the
    higher-cost query should you call the second type, and you must carry the
    original request context across the follow-up turns. When the user first
    searched by alias, phone, address, person name, product name, business scope,
    or other clues, and the original request is clearly for enhanced fields,
    once they confirm the company you should first show the higher-cost
    confirmation flow, and only continue to 企业信息核验 after they reply
    确认, instead of showing 企业工商信息 first. After a query
    completes, do not suggest unsupported capabilities such as 股东信息, 对外投资,
    司法风险, or 历史变更. You may only suggest supported next steps, such as
    querying another company or asking the user to reply 需要 if they want more
    supported enhanced fields.
    If the selected detail interface does not directly hit a company, fall back
    to fuzzy search to help the user reconfirm the correct company full name.

policy:
  allow_implicit_invocation: true
