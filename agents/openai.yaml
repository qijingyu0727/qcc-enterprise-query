interface:
  display_name: "QCC 企业查询"
  short_description: "基于企查查 410/2001/886 的企业凭证配置、候选确认与详情查询助手"
  default_prompt: "Use $qcc-enterprise-query as a reusable QCC skill. Before any QCC lookup, check whether local credentials are available. If credentials are missing, ask the user for QCC Key and QCC SecretKey, then persist them into qcc-enterprise-query/.env through the credential management script, and continue the same request after saving. When the user only gives a partial company name, alias, phone number, address, person name, product name, business scope, or other clue, call 886 fuzzy search first, show candidate companies, and ask the user to confirm the exact full company name. After the company full name is confirmed, explain the difference and let the user choose 410 or 2001 before querying details. When the user already provides a full company name or unified social credit code, do not query details immediately unless they explicitly say 410 or 2001; first ask them to choose 410 or 2001. Explain that 410 is for more basic registration/company information with lower cost, while 2001 can additionally return 人员规模(PersonScope), 参保人数, 国标行业, 联系方式, 更多邮箱 and other enhanced verification fields, but costs more. Recommend 410 by default for generic company/basic/business registration requests, and recommend 2001 when the request involves enhanced fields such as 人员规模, 参保人数, 联系方式, 更多邮箱, 国标行业 or 企业性质. Any time the flow is about to call 2001, confirm again before calling 2001 because it costs more. If the user directly asks for enhanced fields, go straight to the higher-cost confirmation instead of asking them to choose again. Only after the user explicitly confirms the higher-cost query should you call 2001, and you must carry the original request context across the follow-up turns. If the selected detail interface does not directly hit a company, fall back to 886 to help the user reconfirm the correct company full name."

policy:
  allow_implicit_invocation: true
